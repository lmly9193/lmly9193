## Basic Options ##
# 下載目錄
dir=/root/downloads
# 日誌
log=/root/.aria2/aria2.log
# 日誌等級
# Set log level to output. LEVEL is either debug, info, notice, warn or error. Default: debug
log-level=info
# 進度紀錄
input-file=/root/.aria2/aria2.session
# 同時進行任務數
max-concurrent-downloads=10
# 斷線續傳
continue=true

## HTTP/FTP Options ##
# 最低停止速度下限
lowest-speed-limit=10K
# 同伺服器最大連線數
max-connection-per-server=10
# 多點下載的單一分塊最小容量
min-split-size=10M
# 以遠端時間為準
remote-time=false
# 多點下載數量
split=20

## HTTP Specific Options ##
# 修改特徵碼
peer-id-prefix=-TR2770-
user-agent=Transmission/2.77
http-accept-gzip=true

## FTP Specific Options ##
# PASV 模式
ftp-pasv=true

## BitTorrent Specific Options ##
# 啟用本機端的種子來源
bt-enable-lpd=true
# 種子交換, PT需要禁用, 預設:true
enable-peer-exchange=true
# 強制加密
bt-require-crypto=true
# 小於指定速度，就自動提高可請求的連線數
bt-request-peer-speed-limit=100K
# 持續一段時間速度=0 就停止下載
bt-stop-timeout=180
# DHT 埠
enable-dht=true
# IPv4 DHT 路由表檔案
dht-file-path=/root/.aria2/dht.dat
# IPv4 DHT 的通訊埠
dht-listen-port=6881-6999
# IPv4 DHT 進入點
dht-entry-point=router.utorrent.com:6881
# 打開IPv6 DHT功能, PT需要禁用
#enable-dht6=false
# *.torrent 儲存到記憶體，然後自動開始下載
follow-torrent=mem
# BT 的通訊埠
listen-port=6881-6999
# 單個種子最大連接數, 預設:55
#bt-max-peers=55
# 總上傳速度
max-overall-upload-limit=0
# 單檔最大上傳速度
max-upload-limit=0
# 分享率
seed-ratio=0.1
# 做種時間(分) 原:10080
seed-time=0
# 繼續之前的BT任務時, 無需再次校驗, 預設:false
bt-seed-unverified=true
# 強制儲存工作階段, 即使任務已經完成, 預設:false
# 較新的版本開啟後會在任務完成後依然保留.aria2文件
force-save=false
# 刪除未選擇的檔案
bt-remove-unselected-file=true
# BT校驗相關, 預設:true
#bt-hash-check-seed=true
# 儲存磁力連結中繼資料為種子文件(.torrent文件), 預設:false
#bt-save-metadata=true
# BT 伺服器位址
