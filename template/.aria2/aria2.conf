## Metalink Specific Options ##
# *.meta4, *.metalink 儲存到記憶體，然後自動開始下載
#follow-metalink=mem

## RPC Options ##
# 啟用 RPC
enable-rpc=true
# Add Access-Control-Allow-Origin header field with value * to the RPC response.
rpc-allow-origin-all=true
# 監聽來自所有網路介面連入的 JSON-RPC/XML-RPC 請求
rpc-listen-all=true
# 事件輪詢方式
#event-poll=epoll
# 是否啟用 RPC 服務的 SSL/TLS 加密,
# 啟用加密後 RPC 服務需要使用 https 或者 wss 協議連接
rpc-secure=true
# 在 RPC 服務中啟用 SSL/TLS 加密時的證書文件(.pem/.crt)
rpc-certificate=/root/.aria2/acme/example.com/.crt
# 在 RPC 服務中啟用 SSL/TLS 加密時的私鑰文件(.key)
rpc-private-key=/root/.aria2/acme/example.com/.key
# RPC 的通訊埠
rpc-listen-port=6800
# RPC 加密的 Token
rpc-secret=********

## Advanced Options ##
# 允許覆蓋，如果相應的控制檔案不存在時從頭重新下載檔案
allow-overwrite=true
# 以背景服務模式執行
daemon=true
# 停用 IPv6 支援
disable-ipv6=true
# 硬碟快取
disk-cache=32M
# Map files into memory.
enable-mmap=false
# 磁碟空間預先分配
file-allocation=falloc
# 總下載速度
max-overall-download-limit=0
# 單檔最大下載速度
max-download-limit=0
# 小於指定大小的檔案，不預先分配磁碟空間
no-file-allocation-limit=10M
# 錯誤及未完成的檔案下載記錄
save-session=/root/.aria2/aria2.session
# 每幾秒儲存一次檔案下載記錄
save-session-interval=60
# 下載完成執行
on-download-complete=/root/.aria2/autoupload.sh
